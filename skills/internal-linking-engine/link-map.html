#root { width: 100%; }

.cluster-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin: 14px 28px 0; }
.ctab {
  padding: 7px 14px; border-radius: 99px; border: 1px solid #1e293b;
  cursor: pointer; font-size: 12px; font-weight: 600; background: #0f172a; color: #64748b;
  transition: all .15s; white-space: nowrap;

.ctab:hover { border-color: #334155; color: #94a3b8; }
.ctab.active { color: #fff; border-color: transparent; }

/* filter pills */
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 28px 0; align-items: center; }
.filter-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #334155; margin-right: 4px; }
.fpill {
  padding: 4px 12px; border-radius: 99px; border: 1px solid #1e293b;
  cursor: pointer; font-size: 11px; font-weight: 600; background: #0f172a; color: #64748b;
  transition: all .15s;
}
.fpill:hover { border-color: #334155; color: #94a3b8; }
.fpill.fa { background:#3B82F6; border-color:#3B82F6; color:#fff; }
.fpill.fe { background:#475569; border-color:#475569; color:#fff; }
.fpill.fr { background:#22c55e; border-color:#22c55e; color:#000; }
.fpill.fc { background:#f59e0b; border-color:#f59e0b; color:#000; }

/* map */
.map-wrap { padding: 12px 28px 0; }
.svg-container { background: #040e1f; border: 1px solid #1e293b; border-radius: 16px; overflow: hidden; }

/* legend */
.legend-section { display: flex; flex-direction: column; gap: 8px; padding: 12px 28px; border-top: 1px solid #1e293b; }
.legend-row { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; font-size: 11px; }
.legend-group { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #334155; min-width: 40px; }
.legend-item { display: flex; align-items: center; gap: 6px; color: #94a3b8; }

/* stats */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; padding: 12px 28px 24px; }
.stat-card { background: rgba(15,23,42,.8); backdrop-filter: blur(12px); border: 1px solid #1e293b; border-radius: 12px; padding: 14px 16px; position: relative; overflow: hidden; }
.stat-accent { position: absolute; top: 0; left: 0; width: 3px; height: 100%; border-radius: 12px 0 0 12px; }
.stat-value { font-size: 28px; font-weight: 900; line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -.03em; }
.stat-label { font-size: 11px; font-weight: 700; color: #f1f5f9; margin-top: 5px; }
.stat-sub { font-size: 10px; color: #64748b; margin-top: 3px; line-height: 1.4; }

/* tooltip */
.tooltip {
  position: fixed; pointer-events: none;
  background: rgba(10,20,40,.96); backdrop-filter: blur(20px);

.t-stats { margin-top: 7px; padding-top: 7px; border-top: 1px solid #1e293b; font-size: 11px; color: #64748b; display: flex; gap: 12px; }

.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 600; margin-right: 3px; margin-top: 3px; }

// ── HELPERS ───────────────────────────────────────────────────────────────────
function cc(c) {
  const map = { 0:'#10B981', 1:'#3B82F6', 2:'#A855F7', 3:'#06B6D4', 4:'#F59E0B', 5:'#10B981', 6:'#F97316' };
  return map[c] || '#64748b';
}
function nodeRadius(n) {
  if (n.deadWeight) return n.size * 1.1;
  if (n.stage === 'Awareness')     return n.size * 1.05;
  if (n.stage === 'Consideration') return n.size * 1.25;
  return n.size * 1.55;
}
function edgeColor(e) {
  if (e.regression) return '#ef4444';
  if (e.authority)  return '#64748b';
  if (e.type === 'recommended') return e.priority === 'critical' ? '#f59e0b' : e.priority === 'high' ? '#22c55e' : '#818cf8';
  return '#334155';
}
function buildPath(a, b, edge, offset = 0) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  const ux = dx/len, uy = dy/len;
  const sr = nodeRadius(a), tr = nodeRadius(b);
  const sx = a.x + ux*sr, sy = a.y + uy*sr;
  const ex = b.x - ux*tr, ey = b.y - uy*tr;
  const mx = (sx+ex)/2, my = (sy+ey)/2;
  if (edge.regression) return `M ${sx} ${sy} Q ${mx} ${Math.max(sy,ey)+100+offset*25} ${ex} ${ey}`;
  if (edge.authority)  return `M ${sx} ${sy} Q ${mx} ${Math.min(sy,ey)-55-offset*15} ${ex} ${ey}`;
  const perp = offset * 20;
  return `M ${sx} ${sy} C ${sx+(ex-sx)*.38} ${sy+perp} ${sx+(ex-sx)*.62} ${ey+perp} ${ex} ${ey}`;
}
function assignOffsets(edges) {
  const groups = {};
  edges.forEach((e, i) => {
    const key = [e.from, e.to, e.regression?'r':e.authority?'a':'f'].join('|');
    if (!groups[key]) groups[key] = [];
    groups[key].push(i);
  });
  const off = new Array(edges.length).fill(0);
  Object.values(groups).forEach(idxs => {
    const mid = (idxs.length-1)/2;
    idxs.forEach((idx, i) => { off[idx] = i - mid; });
  });
  return off;
}

// ── COMPONENTS ────────────────────────────────────────────────────────────────
function NodeShape({ node, dimmed, hovered }) {
  const c = node.external ? '#475569' : cc(node.cluster);
  const r = node.size;
  const opacity = dimmed ? 0.1 : node.external ? 0.45 : 1;
  const fillOp = hovered ? 0.32 : 0.12;
  const strokeW = hovered ? 2.5 : node.primary ? 2.2 : node.deadWeight ? 1.5 : 1.5;
  const stroke = node.deadWeight ? '#ef4444'
    : hovered ? '#f8fafc'
    : node.primary ? '#fbbf24'
    : c;
  const dashArr = node.deadWeight ? '4 3' : undefined;
  const filter = hovered ? `url(#glow)` : undefined;
  const props = { fill: c, fillOpacity: fillOp, stroke, strokeWidth: strokeW, opacity, filter, strokeDasharray: dashArr };

  if (node.stage === 'Awareness' || node.external)
    return <circle cx={node.x} cy={node.y} r={r} {...props} />;
  if (node.stage === 'Consideration') {
    const s = r * 1.7;
    return <rect x={node.x-s/2} y={node.y-s/2} width={s} height={s} rx={4} {...props} />;
  }
  const d = r * 1.6;
  return <polygon points={`${node.x},${node.y-d} ${node.x+d},${node.y} ${node.x},${node.y+d} ${node.x-d},${node.y}`} {...props} />;
}

function EdgePath({ edge, nodeMap, offset }) {
  const a = nodeMap[edge.from], b = nodeMap[edge.to];
  if (!a || !b) return null;
  const d = buildPath(a, b, edge, offset);
  const color = edgeColor(edge);
  const isDashed = edge.type === 'recommended';
  const isAuth = edge.authority;
  const dashArray = isDashed ? (edge.priority==='critical' ? '8 5' : '6 5') : isAuth ? '3 5' : undefined;
  const sw = isDashed && edge.priority==='critical' ? 2.2 : 1.5;
  const opacity = edge.regression ? 0.75 : isDashed ? 0.88 : isAuth ? 0.35 : 0.35;
  const markId = edge.regression ? 'arr-reg' : edge.authority ? 'arr-auth'
    : edge.type==='recommended' ? `arr-${edge.priority}` : 'arr-exist';
  return <path d={d} fill="none" stroke={color} strokeWidth={sw} strokeDasharray={dashArray} opacity={opacity} markerEnd={`url(#${markId})`} />;
}

            {COLS.map(col => (
              <g key={col.label}>
                <text x={col.x+6} y={34} fontSize={9} fill="#1e3a5f" fontWeight={800} letterSpacing={1.8}>{col.label}</text>
                {col.lineX && <line x1={col.lineX} y1={42} x2={col.lineX} y2={H-10} stroke="#1e293b" strokeWidth={1} strokeDasharray="4 6" />}
              </g>
            ))}

            {/* Edges */}
            {filteredEdges.map((edge, i) => (
              <EdgePath key={i} edge={edge} nodeMap={nodeMap} offset={offsets[i]} />
            ))}

            {/* Nodes */}
            {nodes.map(node => {
              const hovered = hoveredNode === node.id;
              const c = node.external ? '#475569' : cc(node.cluster);
              const labelY = node.y + nodeRadius(node) + 13;
              const labelColor = node.external ? '#334155' : node.deadWeight ? '#ef4444' : '#94a3b8';
              return (
                <g key={node.id} style={{ cursor:'pointer' }}
                  onMouseEnter={e => onEnter(e, node)} onMouseLeave={onLeave}>
                  <NodeShape node={node} hovered={hovered} />
                  {node.primary && !node.external && (
                    <text x={node.x} y={node.y - nodeRadius(node) - 5} textAnchor="middle" fontSize={11} fill="#fbbf24">★</text>
                  )}
                  {node.deadWeight && (
                    <text x={node.x} y={node.y + 4} textAnchor="middle" fontSize={10} fill="#ef4444" fontWeight={700} style={{pointerEvents:'none'}}>✕</text>
                  )}
                  {node.external && (
                    <text x={node.x} y={node.y - nodeRadius(node) - 5} textAnchor="middle" fontSize={9} fill="#475569" fontStyle="italic">ext.</text>
                  )}
                  <text x={node.x} y={labelY} textAnchor="middle" fontSize={10} fill={labelColor}
                    fontWeight={node.primary ? 600 : 400} style={{ pointerEvents:'none', userSelect:'none' }}>
                    {node.label}
                  </text>
                </g>
              );
            })}
          </svg>
        </div>
      </div>

      {/* Legend */}
      <div className="legend-section">
        <div className="legend-row">
          <span className="legend-group">Nodes</span>
          {[
            { shape:'circle',   color:'#3B82F6', label:'Awareness' },
            { shape:'square',   color:'#3B82F6', label:'Consideration' },
            { shape:'diamond',  color:'#3B82F6', label:'Decision / Conversion' },
            { shape:'star',     color:'#fbbf24', label:'★ Primary target' },
            { shape:'dw',       color:'#ef4444', label:'✕ Dead weight' },
            { shape:'ext',      color:'#475569', label:'External cluster (cross-link target)' },
          ].map(item => (
            <div className="legend-item" key={item.label}>
              <svg width={16} height={16} style={{ flexShrink:0 }}>
                {item.shape==='circle'  && <circle cx={8} cy={8} r={5.5} fill="none" stroke={item.color} strokeWidth={1.5}/>}
                {item.shape==='square'  && <rect x={2.5} y={2.5} width={11} height={11} fill="none" stroke={item.color} strokeWidth={1.5}/>}
                {item.shape==='diamond' && <polygon points="8,1 15,8 8,15 1,8" fill="none" stroke={item.color} strokeWidth={1.5}/>}
                {item.shape==='star'    && <text x={2} y={13} fontSize={13} fill={item.color}>★</text>}
                {item.shape==='dw'      && <circle cx={8} cy={8} r={5.5} fill="none" stroke={item.color} strokeWidth={1.5} strokeDasharray="3 2"/>}
                {item.shape==='ext'     && <circle cx={8} cy={8} r={5.5} fill="none" stroke={item.color} strokeWidth={1.5} opacity={0.45}/>}
              </svg>
              <span>{item.label}</span>
            </div>
          ))}
        </div>
        <div className="legend-row">
          <span className="legend-group">Links</span>
          {[
            { dash:'8 5', sw:2.2, color:'#f59e0b', label:'Recommended — Critical' },
            { dash:'6 5', sw:1.5, color:'#22c55e', label:'Recommended — High' },
            { dash:'6 5', sw:1.5, color:'#818cf8', label:'Recommended — Medium' },
            { dash:null,  sw:1.5, color:'#ef4444', label:'Existing regression' },
            { dash:'3 5', sw:1.5, color:'#64748b', label:'Existing authority (widget/structural)' },
            { dash:null,  sw:1.5, color:'#334155', label:'Existing editorial' },
          ].map(item => (
            <div className="legend-item" key={item.label}>
              <svg width={30} height={12} style={{ flexShrink:0 }}>
                <line x1={2} y1={6} x2={28} y2={6} stroke={item.color} strokeWidth={item.sw} strokeDasharray={item.dash||undefined}/>
              </svg>
              <span>{item.label}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Stats */}
      <div className="stats-grid">
        {STAT_CARDS.map(s => (
          <div className="stat-card" key={s.label}>
            <div className="stat-accent" style={{ background: s.color }} />
            <div className="stat-value" style={{ color: s.color }}>{s.value}</div>
            <div className="stat-label">{s.label}</div>
            <div className="stat-sub">{s.sub}</div>
          </div>
        ))}
      </div>

      {/* Tooltip */}
      {tooltip && (
        <div className="tooltip" style={{ left: tooltip.x, top: tooltip.y }}>
          <div className="t-title">{tooltip.node.label}</div>
          <div className="t-url">{tooltip.node.url}</div>
          <span className="badge" style={{ background:`${cc(tooltip.node.cluster)}20`, color: tooltip.node.external ? '#64748b' : cc(tooltip.node.cluster) }}>
            {tooltip.node.external ? 'Cross-cluster' : tooltip.node.cluster === 0 ? 'Shared' : `Cluster ${tooltip.node.cluster}`}
          </span>
          <span className="badge" style={{ background:'#1e293b', color:'#94a3b8', border:'1px solid #334155' }}>{tooltip.node.stage}</span>
          <span className="badge" style={{ background: tooltip.node.deadWeight ? '#1f0909' : '#1e293b', color: tooltip.node.deadWeight ? '#ef4444' : '#94a3b8', border:'1px solid #334155' }}>
            {tooltip.node.deadWeight ? '✕ Dead Weight' : tooltip.node.role}
          </span>
          {tooltip.node.primary && <span className="badge" style={{ background:'#451a03', color:'#fbbf24' }}>★ Primary target</span>}
          {tooltip.node.external && <span className="badge" style={{ background:'#1e293b', color:'#64748b', border:'1px solid #334155' }}>Ext. — cross-cluster link target</span>}
          <div className="t-stats">
            <div>In-cluster in <span>{tooltip.inLinks}</span></div>
            <div>In-cluster out <span>{tooltip.outLinks}</span></div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
